# ============================================================
# Referenz-Compose-Datei
# ------------------------------------------------------------
# Auf Unraid werden die beiden Container direkt ueber die
# Docker-UI angelegt. Alle Variablen werden dort gesetzt.
# Diese Datei dient nur als Dokumentation / lokaler Testlauf.
# ============================================================

services:

  mariadb:
    image: mariadb:11
    container_name: suitecrm-db
    restart: unless-stopped
    environment:
      # >>> In Unraid-Container-UI setzen <<<
      MARIADB_ROOT_PASSWORD: changeme_root
      MARIADB_DATABASE: suitecrm
      MARIADB_USER: suitecrm_user
      MARIADB_PASSWORD: changeme_db
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATE: utf8mb4_unicode_ci
    volumes:
      - /mnt/user/appdata/suitecrm/db:/var/lib/mysql
    networks:
      - suitecrm-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  suitecrm:
    image: ghcr.io/1899nils/kw-suitecrm:latest
    container_name: suitecrm
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /mnt/user/appdata/suitecrm/app:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - suitecrm-net
    environment:
      # >>> In Unraid-Container-UI setzen <<<
      TZ: Europe/Berlin
      DB_HOST: suitecrm-db
      DB_PORT: 3306
      DB_NAME: suitecrm
      DB_USER: suitecrm_user
      DB_PASSWORD: changeme_db
      ADMIN_USER: admin
      ADMIN_PASSWORD: changeme_admin
      SITE_URL: http://192.168.1.100:8080

networks:
  suitecrm-net:
    name: suitecrm-network
    driver: bridge
